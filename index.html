<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kampanye Zero Titip Absen UNNES</title>
    <style>
        :root {
            --bg-color: #f4fbf4;
            --primary-green: #66bb6a;
            --hover-green: #43a047;
            --card-bg: #ffffff;
            --text-dark: #1b5e20;
            --text-muted: #555555;
            --shadow: 0 8px 20px rgba(76, 175, 80, 0.08);
            --input-bg: #f9fdf9;
            --input-border: #c8e6c9;
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --primary-green: #81c784;
            --hover-green: #a5d6a7;
            --card-bg: #1e1e1e;
            --text-dark: #e8f5e9;
            --text-muted: #b0bec5;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            --input-bg: #2c2c2c;
            --input-border: #444444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: var(--transition);
        }

        header {
            text-align: center;
            padding: 40px 20px 20px;
            width: 100%;
            position: relative;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 2px solid var(--primary-green);
            color: var(--text-dark);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        main {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            flex-grow: 1;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .menu-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            border: 2px solid transparent;
            transition: var(--transition);
        }

        .menu-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-green);
        }

        .menu-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .menu-card h3 {
            font-size: 1.2rem;
            color: var(--text-dark);
        }

        .content-section {
            display: none;
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 40px;
            box-shadow: var(--shadow);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content-section h2 {
            margin-bottom: 20px;
            color: var(--text-dark);
            border-bottom: 2px solid var(--primary-green);
            padding-bottom: 10px;
            display: inline-block;
        }

        .content-section p {
            line-height: 1.8;
            color: var(--text-muted);
            margin-bottom: 15px;
            font-size: 1.05rem;
        }

        .btn-back {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background-color: var(--input-bg);
            color: var(--text-dark);
